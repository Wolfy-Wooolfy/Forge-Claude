# ── Forge API Server — Docker Compose / Podman Compose ───────────────────────
# Tier 2 (optional) — single-service compose for local Docker/Podman.
# Reuses PHASE-7-C container infrastructure (container_tools.js).
# No closure verification required for PHASE-12.
#
# Usage:
#   docker compose up -d          — start in background
#   docker compose down           — stop and remove container
#   docker compose logs -f        — follow logs
#   docker compose ps             — check status
#
# Prerequisites:
#   - Docker Desktop >= 4.x or Podman >= 4.x with compose plugin
#   - Run from the Forge repo root (where this file is located, or adjust
#     context: below to point to the repo root)
#
# Windows networking note (Tier-2 — no closure verification required):
#   Docker Desktop on Windows uses a virtual network adapter. Port mapping
#   127.0.0.1:3100:3100 binds ONLY to the host's loopback adapter (consistent
#   with D5 localhost-binding security policy). If you need the container to
#   reach host services, use host.docker.internal instead of localhost.
# ────────────────────────────────────────────────────────────────────────────

name: forge

services:
  forge-api:
    build:
      context: ../..
      dockerfile: scripts/service/Dockerfile
    image: forge-api:latest
    container_name: forge-api

    ports:
      # Bind to loopback only (consistent with D5 localhost-binding policy)
      - "127.0.0.1:3100:3100"

    volumes:
      # Stateful directories — mount from host (NOT baked into the image)
      - ../../artifacts:/app/artifacts
      - ../../progress:/app/progress
      - ../../logs:/app/logs
      # Optional: mount .env for secrets (prefer keychain via D2 when available)
      # - ../../.env:/app/.env:ro

    environment:
      - NODE_ENV=production
      - FORGE_API_PORT=3100
      # Forward API key from host environment (D2 keychain migration pending Stage 12.2)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}

    restart: unless-stopped

    # Resource limits (sensible defaults for personal production setup)
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://127.0.0.1:3100/api/system/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
